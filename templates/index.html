<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShadowTrap | Intelligence Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="cursor-glow"></div>

    <div class="perspective-wrapper">
        <section class="panel home-panel">
            <h1 class="glitch-title">SHADOWTRAP</h1>
            <p style="color:var(--neon)">CYBER INTELLIGENCE PLATFORM</p>
        </section>

        <section class="panel chart-panel">
            <h2 style="color:var(--neon); margin-bottom:30px; font-family:Orbitron;">📊 THREAT LANDSCAPE</h2>
            <div class="chart-container-grid">
                <div class="chart-box"><canvas id="threatChart"></canvas></div>
                <div class="chart-box"><canvas id="userChart"></canvas></div>
            </div>
        </section>

        <section class="panel monitor-panel">
            <div class="logs-window">
                <h2 style="color:var(--neon); margin-bottom:20px; font-family:Orbitron;">🚨 THREAT MONITOR</h2>
                <div style="max-height:50vh; overflow-y:auto;">
                    <table>
                        <thead><tr><th>TIME</th><th>IP</th><th>LOCATION</th><th>USER:PASS</th><th>LEVEL</th><th>FORENSICS</th></tr></thead>
                        <tbody id="logsBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <div id="replayModal" class="modal">
        <div class="modal-content">
            <span onclick="closeReplay()" style="float:right; cursor:pointer; color:var(--pink);">[ CLOSE ]</span>
            <h3 style="color:var(--neon); margin-bottom:15px;">> FORENSIC_REPLAY</h3>
            <div class="fake-terminal"><span id="replayText"></span><span class="cursor"></span></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
