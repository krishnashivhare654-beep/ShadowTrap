<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SHADOWTRAP | Global Threat Intelligence</title>
    <script src="//unpkg.com/globe.gl"></script>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2fe; --pink: #ff0055; --bg: #020205; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Share Tech Mono', monospace; overflow: hidden; }
        
        #globeViz { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* HUD Panels */
        .hud { position: absolute; z-index: 10; pointer-events: none; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content:建设-between; padding: 20px; }
        .panel { pointer-events: auto; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border: 1px solid var(--neon); border-radius: 4px; padding: 15px; box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); }
        
        .top-bar { display: flex; justify-content: space-between; align-items: flex-start; }
        .logs-box { width: 320px; height: 60vh; overflow-y: auto; }
        .stats-box { width: 200px; text-align: center; }
        
        .bottom-bar { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
        .info-panel { width: 280px; font-size: 0.85rem; }

        h1, h2 { font-family: 'Audiowide', cursive; color: var(--neon); margin: 0 0 10px 0; font-size: 1.2rem; letter-spacing: 2px; }
        .stat-num { font-size: 2.5rem; color: var(--neon); font-weight: bold; }
        
        .log-item { border-left: 2px solid var(--neon); padding-left: 10px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
        .log-item:hover { border-left-color: var(--pink); background: rgba(255,255,255,0.05); }
        .log-item b { color: var(--pink); }

        /* Ripple Cursor */
        .ripple { position: fixed; border: 2px solid var(--neon); border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); animation: ripple-anim 0.6s ease-out; z-index: 999; }
        @keyframes ripple-anim { from { width: 0; height: 0; opacity: 1; } to { width: 80px; height: 80px; opacity: 0; } }
    </style>
</head>
<body>
    <div id="globeViz"></div>

    <div class="hud">
        <div class="top-bar">
            <div class="panel logs-box">
                <h2>🚨 THREAT FEED</h2>
                <div id="logs-list"></div>
            </div>
            <div class="panel stats-box">
                <h2>TOTAL HITS</h2>
                <div class="stat-num" id="total-count">0</div>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="panel info-panel">
                <h2>ℹ️ SYSTEM INFO</h2>
                <p>ShadowTrap v3.0<br>Role: Intelligent SSH Decoy<br>Status: Monitoring...</p>
            </div>
            <div class="panel info-panel">
                <h2>❓ PROTOCOL</h2>
                <p>To test: <code style="color:var(--neon)">ssh root@localhost -p 2222</code><br>Click any log to rotate Earth.</p>
            </div>
        </div>
    </div>

    <script>
        // 1. Mouse Ripple Logic
        window.addEventListener('mousedown', (e) => {
            const r = document.createElement('div');
            r.className = 'ripple';
            r.style.left = e.clientX + 'px';
            r.style.top = e.clientY + 'px';
            document.body.appendChild(r);
            setTimeout(() => r.remove(), 600);
        });

        // 2. 3D Globe Config
        const world = Globe()
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
            .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
            .pointColor(() => '#ff0055')
            .pointAltitude(0.1)
            .pointRadius(0.5)
            (document.getElementById('globeViz'));

        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.6;

        // 3. Live Sync
        function refresh() {
            fetch('/api/stats').then(res => res.json()).then(data => {
                document.getElementById('total-count').innerText = data.total_attacks;
                
                let list = "";
                data.recent_attacks.forEach(a => {
                    list += `<div class="log-item" onclick="aimEarth(${a.lat}, ${a.lon})">
                        <b>${a.ip}</b><br>${a.location}<br>CMD: ${a.command}
                    </div>`;
                });
                document.getElementById('logs-list').innerHTML = list;
                world.pointsData(data.recent_attacks);
            });
        }

        function aimEarth(lat, lon) {
            world.pointOfView({ lat: lat, lng: lon, altitude: 1.5 }, 2000);
        }

        setInterval(refresh, 4000);
        refresh();
    </script>
</body>
</html>
