<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShadowTrap | Forensic Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="cursor-glow"></div>

    <div class="perspective-wrapper">
        <section class="panel home-panel">
            <div class="hero-box">
                <h1 class="glitch-title">SHADOWTRAP</h1>
                <p class="tagline">FORENSIC REPLAY SYSTEM</p>
                <div class="scroll-hint">SCROLL TO REPLAY ATTACKS</div>
            </div>
        </section>

        <section class="panel monitor-panel">
            <div class="monitor-content">
                <div class="stats-row">
                    <div class="stat-card hover-big">
                        <h2 id="totalAttacks">0</h2><p>TOTAL HITS</p>
                    </div>
                </div>
                
                <div class="logs-window hover-big">
                    <h3 class="window-title">🚨 RISK FEED (CLICK ROW TO REPLAY)</h3>
                    <div class="table-scroll">
                        <table>
                            <thead><tr><th>TIME</th><th>IP</th><th>LOCATION</th><th>USER:PASS</th><th>LEVEL</th><th>ACTION</th></tr></thead>
                            <tbody id="logsBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="replayModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeReplay()">[ CLOSE ]</span>
            <h2 style="color:var(--neon)">> FORENSIC_REPLAY_MODE</h2>
            <div id="terminalBody" class="fake-terminal">
                <span style="color:var(--low)">[SYSTEM]: Initializing session playback...</span><br>
                <span id="replayText"></span><span class="cursor">_</span>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
