<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShadowTrap | 3D Cyber Intel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="cursor-glow"></div>

    <div class="perspective-wrapper">
        <section class="panel home-panel">
            <div class="hero-box">
                <h1 class="glitch-title">SHADOWTRAP</h1>
                <p style="color:var(--neon); text-align:center; letter-spacing:5px;">V3.2 FORENSIC ENGINE</p>
                <div style="margin-top:50px; text-align:center; color:#555;">↓↓ SCROLL TO ENTER 3D MONITOR ↓↓</div>
            </div>
        </section>

        <section class="panel monitor-panel">
            <div class="logs-window">
                <h2 style="color:var(--neon); margin-bottom:20px; font-family:Orbitron;">🚨 THREAT MONITOR [ <span id="totalAttacks">0</span> ]</h2>
                <div style="max-height:50vh; overflow-y:auto;">
                    <table>
                        <thead><tr><th>TIMESTAMP</th><th>SOURCE IP</th><th>LOCATION</th><th>CREDENTIALS</th><th>LEVEL</th><th>FORENSICS</th></tr></thead>
                        <tbody id="logsBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <div id="replayModal" class="modal">
        <div class="modal-content">
            <span onclick="closeReplay()" style="float:right; cursor:pointer; color:var(--pink);">[ CLOSE ]</span>
            <h3 style="color:var(--neon); margin-bottom:15px;">> FORENSIC_REPLAY_MODE</h3>
            <div class="fake-terminal">
                <span id="replayText"></span><span class="cursor"></span>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
